<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>अर्डर प्राप्त भयो – धन्यवाद</title>
    <link rel="icon" type="image/png" href="/Images/favicon.png">
    <style>
        :root {
            --bg-page: #e5eff7;
            --green-main: #16a34a;
            --green-dark: #166534;
            --text-main: #111827;
            --text-muted: #4b5563;
            --card-radius: 28px;
            --shadow-card: 0 18px 45px rgba(15, 23, 42, 0.16);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-page);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrap {
            width: 100%;
            max-width: 480px;
            padding: 16px;
        }

        .card {
            background: #ffffff;
            padding: 28px 22px 24px;
            border-radius: var(--card-radius);
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .icon-box {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            background: var(--green-main);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .icon-box span {
            font-size: 42px;
            color: #ffffff;
            line-height: 1;
        }

        h1 {
            margin: 0 0 10px;
            font-weight: 800;
            color: var(--green-dark);
            font-size: clamp(20px, 5vw, 26px);
            line-height: 1.3;
        }

        p {
            margin: 0 0 22px;
            color: var(--text-muted);
            font-size: clamp(14px, 3.5vw, 16px);
            line-height: 1.7;
        }

        p strong {
            color: var(--text-main);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            margin-top: 10px;
            transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
        }

        .btn-whatsapp {
            background: var(--green-main);
            color: #ffffff;
            box-shadow: 0 10px 28px rgba(22, 163, 74, 0.40);
        }

        .btn-home {
            background: #ffffff;
            border: 1px solid #d1d5db;
            color: var(--text-main);
        }

        .btn-whatsapp:hover {
            background: #15803d;
            transform: translateY(-1px);
        }

        .btn-home:hover {
            background: #f9fafb;
            transform: translateY(-1px);
        }

        .btn-whatsapp:active,
        .btn-home:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* Small phones */
        @media (max-width: 480px) {
            .card {
                padding: 24px 18px 20px;
                border-radius: 22px;
            }

            .icon-box {
                width: 64px;
                height: 64px;
                border-radius: 18px;
            }

            .icon-box span {
                font-size: 36px;
            }
        }

        /* Larger screens */
        @media (min-width: 768px) {
            body {
                padding: 32px 0;
            }

            .wrap {
                max-width: 520px;
            }

            .card {
                padding: 32px 28px 26px;
            }
        }
    </style>
</head>

<body>
<div class="wrap">
    <div class="card">
        <div class="icon-box">
            <span>✓</span>
        </div>

        <h1>अर्डर सफलतापूर्वक सबमिट भयो</h1>

        <p>
            हजुरको अर्डर प्राप्त भइसकेको छ।<br>
            हाम्रो टिमबाट चाँडै <strong>कल आउनेछ</strong>, कृपया फोन
            <strong>उठाइदिनुहोला</strong>।
        </p>

        <a href="https://wa.me/9779764379199" target="_blank" class="btn btn-whatsapp">
            WhatsApp मा कुरा गर्नुहोस्
        </a>

        <a href="https://hpsoil.shop/" class="btn btn-home">
            होमपेजमा फर्कनुहोस्
        </a>
    </div>
</div>
